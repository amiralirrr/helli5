<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حلی ۵ - صفحه اصلی</title>
  <style>
    body{
      font-family: Tahoma, sans-serif;
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#f4f6fb;
      color:#222;
    }
    .box{
      width: min(720px, calc(100% - 32px));
      background:#fff;
      padding:28px;
      border-radius:16px;
      box-shadow:0 8px 30px rgba(0,0,0,.08);
      text-align:center;
    }
    h1{ margin:0 0 10px; color:#1f4acc; }
    p{ margin: 0 0 18px; color:#444; }
    a{
      display:inline-block;
      padding:12px 18px;
      background:#1f4acc;
      color:#fff;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
    }
    a:hover{ background:#163a9a; }
    .muted{ margin-top: 12px; color:#6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>پلتفرم حلی ۵</h1>
    <p>فعلاً بخش فعال سایت، وبلاگ مدرسه است.</p>
    <a href="./artifact.html">ورود به وبلاگ</a>
    <div class="muted">برای ثبت پست، از پنل ادمین داخل وبلاگ استفاده کن.</div>
  </div>
</body>
</html>
